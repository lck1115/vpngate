services:
  vpngate-socks5:
    image: ghcr.io/lck1115/vpngate:latest
    container_name: vpngate-socks5
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "127.0.0.1:${SOCKS_PORT:-1080}:1080"
    environment:
      SOCKS_PORT: "1080"
      DEFAULT_COUNTRY: ""
      LIST_LIMIT: "10"
      MIN_SPEED: "0"
      MAX_PING: "9999"
      PROTOCOL_POLICY: "prefer_tcp"
      PREFER_TCP: "true"
      FAILED_NODE_TTL_SECONDS: "1800"
      VPNGATE_API_URLS: "https://www.vpngate.net/api/iphone/,https://api.vpngate.net/api/iphone/"
      API_TIMEOUT: "20"
      USE_CACHE_ON_API_FAILURE: "true"
      HEALTHCHECK_URL: "https://api.ipify.org"
      CONNECT_TIMEOUT: "10"
      SWITCH_ROLLBACK: "true"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vpngate", "health"]
      interval: 60s
      timeout: 20s
      retries: 2
      start_period: 90s
